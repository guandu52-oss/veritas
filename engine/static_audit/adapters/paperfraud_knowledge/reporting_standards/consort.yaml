# CONSORT 2010 — 随机对照试验报告规范参考
# 用途: Layer 3 报告标准参考库，供 Reviewer 评分时对照
# 来源: Schulz KF, et al. CONSORT 2010 Statement. BMJ. 2010

standard: "CONSORT 2010"
type: "reporting_standard"
study_type: "RCT (随机对照试验)"
description: >
  CONSORT (Consolidated Standards of Reporting Trials) 2010
  包含 25 项检查清单和流程图，是 RCT 报告的国际标准。

checklist:
  - item: "1a"
    section: "标题和摘要"
    requirement: "标题中标识为随机试验"
  - item: "1b"
    section: "标题和摘要"
    requirement: "结构化摘要，包含试验设计、方法、结果和结论"
  - item: "2a"
    section: "引言-背景"
    requirement: "科学背景和原理解释"
  - item: "2b"
    section: "引言-目的"
    requirement: "具体目的或假设"
  - item: "3a"
    section: "方法-试验设计"
    requirement: "描述试验设计（平行/交叉/析因），包括分配比"
  - item: "3b"
    section: "方法-试验设计"
    requirement: "试验开始后方法的重大变更及原因"
  - item: "4a"
    section: "方法-受试者"
    requirement: "受试者纳入标准"
  - item: "4b"
    section: "方法-受试者"
    requirement: "资料收集的机构和地点"
  - item: "5"
    section: "方法-干预"
    requirement: "详述各组干预措施，以便重复"
  - item: "6a"
    section: "方法-结局指标"
    requirement: "完整定义预先设定的主要和次要结局指标及测量方法"
  - item: "6b"
    section: "方法-结局指标"
    requirement: "试验开始后结局指标的任何变更及原因"
  - item: "7a"
    section: "方法-样本量"
    requirement: "样本量确定方法"
  - item: "7b"
    section: "方法-样本量"
    requirement: "中期分析和试验终止原则的说明"
  - item: "8a"
    section: "方法-随机化"
    requirement: "生成随机分配序列的方法"
  - item: "8b"
    section: "方法-随机化"
    requirement: "随机化类型及任何限制（区组/分层）"
  - item: "9"
    section: "方法-分配隐藏"
    requirement: "实施随机分配序列的机制"
  - item: "10"
    section: "方法-实施"
    requirement: "谁生成分配序列、谁登记受试者、谁分配干预"
  - item: "11a"
    section: "方法-盲法"
    requirement: "设盲对象和设盲方法"
  - item: "11b"
    section: "方法-盲法"
    requirement: "干预措施的相似性描述"
  - item: "12a"
    section: "方法-统计方法"
    requirement: "比较主要结局的统计方法"
  - item: "12b"
    section: "方法-统计方法"
    requirement: "附加分析方法（亚组分析/校正分析）"
  - item: "13a"
    section: "结果-受试者流程"
    requirement: "每阶段受试者流程图"
  - item: "13b"
    section: "结果-受试者流程"
    requirement: "失访和排除情况及原因"
  - item: "14a"
    section: "结果-招募"
    requirement: "招募期和随访时间"
  - item: "14b"
    section: "结果-招募"
    requirement: "试验结束或中止的原因"
  - item: "15"
    section: "结果-基线资料"
    requirement: "各组基线人口学和临床特征表"
  - item: "16"
    section: "结果-分析人数"
    requirement: "各分析纳入的受试者数及是否按最初分组分析 (ITT)"
  - item: "17a"
    section: "结果-结局和估计"
    requirement: "各主要和次要结局的结果，效应量及精确度"
  - item: "17b"
    section: "结果-结局和估计"
    requirement: "二分类结局推荐报告绝对和相对效应量"
  - item: "18"
    section: "结果-辅助分析"
    requirement: "任何附加分析结果，包括亚组分析和校正分析"
  - item: "19"
    section: "结果-危害"
    requirement: "各组所有重要危害或非预期效应"
  - item: "20"
    section: "讨论-局限性"
    requirement: "试验的局限性，潜在偏倚来源，不精确性等"
  - item: "21"
    section: "讨论-可推广性"
    requirement: "试验结果的可推广性（外部有效性、适用性）"
  - item: "22"
    section: "讨论-解释"
    requirement: "与现有证据一致或不一致的解释"
  - item: "23"
    section: "其他-注册"
    requirement: "试验注册号和注册机构名称"
  - item: "24"
    section: "其他-方案"
    requirement: "可获取完整试验方案的地点"
  - item: "25"
    section: "其他-资助"
    requirement: "资助来源和其他支持"
